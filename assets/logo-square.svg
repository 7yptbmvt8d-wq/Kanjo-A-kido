<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="Kanjo Aïkido Isulanu — Isula di Corsica">
  <!-- Recréation vectorielle fidèle du logo. Pour l'original exact (texture or),
       déposer le PNG via l'admin / GitHub. -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9d086"/>
      <stop offset="0.5" stop-color="#c9a24d"/>
      <stop offset="1" stop-color="#a8842c"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="#14110a"/>
  <circle cx="512" cy="512" r="468" fill="none" stroke="#c9a24d" stroke-width="2" opacity="0.5"/>
  <text x="512" y="278" text-anchor="middle" fill="#c9a24d"
        font-family="'Cinzel',serif" font-weight="600" font-size="50" letter-spacing="20">KANJO AÏKIDO</text>
  <text x="512" y="470" text-anchor="middle" fill="url(#gold)"
        font-family="'Hiragino Mincho ProN','Yu Mincho','Songti SC','Noto Serif CJK JP',serif"
        font-size="210">寅</text>
  <text x="512" y="660" text-anchor="middle" fill="url(#gold)"
        font-family="'Hiragino Mincho ProN','Yu Mincho','Songti SC','Noto Serif CJK JP',serif"
        font-size="210">枢</text>
  <line x1="232" y1="752" x2="312" y2="752" stroke="#c9a24d" stroke-width="2"/>
  <line x1="712" y1="752" x2="792" y2="752" stroke="#c9a24d" stroke-width="2"/>
  <text x="512" y="768" text-anchor="middle" fill="#c9a24d"
        font-family="'Space Grotesk',sans-serif" font-size="58" letter-spacing="20">ISULANU</text>
  <text x="512" y="840" text-anchor="middle" fill="#9a8c66"
        font-family="'Cormorant Garamond',serif" font-style="italic" font-size="40">Isula di Corsica</text>
</svg>
